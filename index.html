<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="normalize.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />

    <title>Password Generator</title>
  </head>
  <body>
    <main>
      <section aria-label="the section for generating secure Password">
        <h1>Generate a <span>random password</span></h1>
        <p>Never use an unsecure password again.</p>

        <button class="generate-psw-btn">Generate passwords</button>

        <div class="line"></div>

        <div class="passwords-display">
          <p class="first-password"></p>
          <p class="second-password"></p>
        </div>
        <p class="copy-feedback"></p>
      </section>
    </main>
  </body>
</html>
